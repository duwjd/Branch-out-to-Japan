<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>① 진단 리포트 · 2. 진단 처리</title>
<!--
  비배포 · 기획 검토용 인터랙티브 프로토타입.
  정본: 01-report-ui-기획서.md # 2. 진단 처리 (PROCESS-00~03)
  Claude Design "KGLOW 진단 리포트 v2" 의 처리 화면을 바닐라로 이식.
  콜② 감사 실패 = 전체 실패(PROCESS-02) — 여기선 성공 플로우만 시연.
-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<link rel="stylesheet" href="wireframe.css" />
</head>
<body>

<!-- 프로토타입 검토 스트립 -->
<div class="wf-strip">
  <div class="wf-strip-in">
    <span class="tag">① 진단 리포트 · 프로토타입</span>
    <a href="index.html">플로우</a>
    <a href="1-input.html">입력</a>
    <a href="2-process.html" class="on">처리</a>
    <a href="3-report.html">리포트</a>
    <a href="01-report-ui-기획서.md">기획서 ↗</a>
    <span class="ex">비배포 · 기획 검토용</span>
  </div>
</div>

<div style="min-height:100vh;display:flex;flex-direction:column">
  <!-- 앱 헤더 -->
  <header class="app-header">
    <div class="app-header-in">
      <span class="app-wordmark">KGLOW<span>.</span></span>
      <span class="app-divider"></span>
      <span class="app-crumb">진단 리포트</span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <a href="1-input.html" class="hbtn hbtn-ghost h-soft" style="display:inline-flex;align-items:center;text-decoration:none">← 새 진단</a>
      </div>
    </div>
  </header>

  <!-- 2. 진단 처리 -->
  <main style="flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;animation:fadeUp .45s ease both">
    <div style="width:100%;max-width:560px">
      <div role="status" aria-live="polite" style="background:#fff;border:1px solid rgba(112,115,124,0.14);border-radius:18px;padding:44px 40px;text-align:center;box-shadow:0 1px 3px rgba(16,18,20,.04)">
        <h2 style="margin:0;font-size:20px;font-weight:800;color:#202124;letter-spacing:-0.01em">진단 리포트를 생성하고 있습니다…</h2>
        <p id="curStage" style="margin:10px 0 0;font-size:14.5px;font-weight:600;color:#D93636">콘텐츠 정규화 · 문장 분해</p>
        <div style="margin-top:24px;height:6px;border-radius:9999px;background:#F6F6F6;overflow:hidden;position:relative">
          <span style="position:absolute;top:0;left:0;height:100%;width:34%;border-radius:9999px;background:linear-gradient(90deg,#FF6464,#D93636);animation:indet 1.5s cubic-bezier(0.4,0,0.2,1) infinite"></span>
        </div>
        <div id="stageList" style="margin-top:28px;text-align:left;border-top:1px solid #EBEBEB;padding-top:18px"></div>
        <p style="margin:22px 0 0;font-size:12.5px;line-height:1.6;color:rgba(55,56,60,0.61)">실제 서비스는 수 분이 걸릴 수 있습니다. 화면을 닫아도 처리는 계속됩니다.</p>
        <div id="doneRow" style="margin-top:20px;display:none">
          <a href="3-report.html" class="hbtn h-primary" style="display:inline-flex;align-items:center;justify-content:center;width:100%;height:48px;border:none;border-radius:12px;background:#FF6464;color:#fff;font-size:15px;font-weight:700;text-decoration:none">리포트 열기 →</a>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
/**
 * 진단 처리 스텝 애니메이션 (v2 startProcessing 로직 이식).
 * 7단계를 processSeconds(기본 5초)에 걸쳐 진행하고, 입력 플로우에서
 * 넘어왔으면 리포트로 자동 이동, 직접 열었으면 "리포트 열기" 버튼 노출.
 */
(function () {
  var STAGES = [
    '콘텐츠 정규화 · 문장 분해',
    '신뢰 장치 신호 추출',
    '루브릭 채점 · 薬機法 감사 · 페르소나 (병렬 진단 중)',
    '점수 집계 (결정적)',
    '코퍼스 벤치마크 대비',
    'NG/OK 재작성 · 총평 생성',
    '리포트 조립'
  ];
  var PROCESS_SECONDS = 5;
  var listEl = document.getElementById('stageList');
  var curEl = document.getElementById('curStage');
  var doneRow = document.getElementById('doneRow');

  // 입력 폼에서 제출로 넘어왔는지(자동 이동 여부) 판별
  var cameFromFlow = sessionStorage.getItem('kglow_flow') === '1';
  sessionStorage.removeItem('kglow_flow');

  var rows = STAGES.map(function (label) {
    var row = document.createElement('div');
    var dot = document.createElement('span');
    var txt = document.createElement('span');
    txt.textContent = label;
    row.appendChild(dot);
    row.appendChild(txt);
    listEl.appendChild(row);
    return { row: row, dot: dot };
  });

  /** stageIdx 기준으로 각 행의 done/current/pending 상태를 다시 칠한다 */
  function paint(stageIdx) {
    rows.forEach(function (r, i) {
      var done = stageIdx > i, cur = stageIdx === i;
      r.row.setAttribute('style',
        'display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13.5px;' +
        (cur ? 'color:#202124;font-weight:700' : done ? 'color:#414245' : 'color:#B6B8BF'));
      r.dot.textContent = done ? '✓' : '';
      r.dot.setAttribute('style',
        'width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none;box-sizing:border-box;' +
        (done ? 'background:#FF6464;color:#fff'
              : cur ? 'border:2px solid #FF6464;background:#FFF8F8;animation:pulse 1.1s ease infinite'
                    : 'border:2px solid #E3E4E8;background:#fff'));
    });
    curEl.textContent = (stageIdx >= 0 && stageIdx < STAGES.length) ? STAGES[stageIdx] : '완료';
  }

  var stageIdx = 0;
  paint(stageIdx);
  var total = Math.max(0, PROCESS_SECONDS) * 1000;
  var timer = setInterval(function () {
    var n = stageIdx + 1;
    if (n >= STAGES.length) {
      clearInterval(timer);
      paint(STAGES.length); // 전부 done
      if (cameFromFlow) {
        setTimeout(function () { location.href = '3-report.html'; }, 500);
      } else {
        doneRow.style.display = 'block';
      }
    } else {
      stageIdx = n;
      paint(stageIdx);
    }
  }, total / STAGES.length);
})();
</script>
</body>
</html>
